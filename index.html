<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>SEMESTA ON STAGE</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ==========================================
TOP BAR
=========================================== -->

<header class="topbar">

    <div class="status">

        <span id="status-dot"></span>

        <span id="status-text">

            ONLINE

        </span>

    </div>

    <div class="datetime">

        <div id="date">

            Sabtu, 12 Juli 2026

        </div>

        <div id="time">

            21:00:00 WIB

        </div>

    </div>

</header>

<!-- ==========================================
MAIN
=========================================== -->

<main class="container">

    <!-- Logo -->

    <img
        src="logo-semesta.png"
        alt="SEMESTA"
        class="logo">

    <!-- Event -->

    <h1 id="event-name">

        Loading Project...

    </h1>

    <!-- Duration -->

    <div class="duration-title">

        Total Duration

    </div>

    <div id="duration">

        --:--:--

    </div>

    <hr>

    <!-- Menu -->

    <div class="menu">

        <button id="timer">

            Stage Timer

        </button>

        <button id="backstage">

            Backstage

        </button>

        <button id="timeline">

            Timeline

        </button>

        <button id="studio">

            Studio

        </button>

    </div>

    <hr>

    <!-- Crew -->

    <div class="crew">

        <p>

            Show Director :

            <span id="show-director">

                -

            </span>

        </p>

        <p>

            Stage Manager :

            <span id="stage-manager">

                -

            </span>

        </p>

    </div>

</main>

<!-- ==========================================
FOOTER
=========================================== -->

<footer>

    <div>

        semesta on stage

    </div>

    <small>

        powered by signal13

    </small>

</footer>

<script src="config.js"></script>

<script src="app.js"></script>

</body>

</html>
