<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SIGNAL13 Dashboard</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="dashboard">

        <!-- =========================
             STATUS BAR
        ========================== -->

        <header class="status-bar">

            <div class="status-wrapper">

                <div class="status-online">

                    <span class="status-text">
                        ONLINE
                    </span>

                    <span class="status-dot"></span>

                </div>

                <div class="status-date">
                    Sabtu, 18 Juli 2026
                </div>

                <div class="status-time">
                    22:45:20
                </div>

            </div>

        </header>


        <!-- =========================
                MAIN
        ========================== -->

        <main class="main-content">


            <!-- HERO -->

            <section class="hero">

                <img
                    src="assets/images/logo-semesta.png"
                    alt="Semesta Logo"
                    class="hero-logo">

                <h1 class="project-title">
                    EUFORIA ART 11
                </h1>

                <div class="duration">

                    <div class="duration-line"></div>

                    <div class="duration-info">

                        <span class="duration-label">
                            TOTAL DURATION
                        </span>

                        <span class="duration-time">
                            01:32:15
                        </span>

                    </div>

                    <div class="duration-line"></div>

                </div>

            </section>


            <!-- LAUNCHER -->

            <section class="launcher">

                <a href="#" class="launcher-button">

                    <img src="assets/icons/timer.svg">

                    <span>Timer</span>

                </a>

                <a href="#" class="launcher-button">

                    <img src="assets/icons/backstage.svg">

                    <span>Backstage</span>

                </a>

                <a href="#" class="launcher-button">

                    <img src="assets/icons/timeline.svg">

                    <span>Timeline</span>

                </a>

                <a href="#" class="launcher-button">

                    <img src="assets/icons/studio.svg">

                    <span>Studio</span>

                </a>

            </section>


            <!-- CREW -->

            <section class="crew">

                <div class="crew-item">

                    <span class="crew-label">
                        Show Director
                    </span>

                    <span class="crew-name">
                        Aji Saputra
                    </span>

                </div>

                <div class="crew-divider"></div>

                <div class="crew-item">

                    <span class="crew-label">
                        Stage Manager
                    </span>

                    <span class="crew-name">
                        Ridwan
                    </span>

                </div>

            </section>


            <!-- QUICK LINK -->

            <section class="quick-links">

                <a href="#" class="outline-button">

                    <img src="assets/icons/document.svg">

                    <span>Kendali Semesta</span>

                </a>

                <a href="#" class="outline-button">

                    <img src="assets/icons/instagram.svg">

                    <span>Instagram</span>

                </a>

            </section>

        </main>


        <!-- FOOTER -->

        <footer>

            Powered by SIGNAL13

        </footer>

    </div>

</body>

</html>
